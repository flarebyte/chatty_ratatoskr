  language: go
  purpose: Wire the chatty CLI entrypoint to the mock-server runtime and expose the product-facing help, version, and serve commands.
  responsibilities:
    - Parse CLI arguments and dispatch Cobra commands.
    - Load runtime config and start the HTTP server with graceful shutdown.
    - Assemble the top-level HTTP routes and shared stores for the process.
  architecture_notes:
    - Keep this file focused on CLI and process wiring; protocol behavior belongs in internal/httpapi.
    - Version output is driven by injected build metadata so tests and builds stay deterministic.
    - Server composition happens here so agents can ask this file about process startup, not protocol rules.
